<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zebra Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Zebra Notes</h1>
        </header>

        <main>
            <table class="puzzle-grid">
                <thead>
                    <tr>
                        <th class="category-label">Category</th>
                        <th>House 1</th>
                        <th>House 2</th>
                        <th>House 3</th>
                        <th>House 4</th>
                        <th>House 5</th>
                    </tr>
                </thead>
                <tbody id="grid-body">
                    <!-- Rows will be injected by JavaScript -->
                </tbody>
            </table>

            <section class="notes-section">
                <label class="notes-label">Deductions & Clues</label>
                <textarea id="notes-area" placeholder="Type your clues or deductions here..."></textarea>
            </section>

            <div class="controls">
                <button id="reset-btn">Clear Everything</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
