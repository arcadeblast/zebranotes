<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zebra Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Zebra Notes</h1>
            <nav class="view-switch">
                <button id="show-setup">Setup</button>
                <button id="show-clues">Clues</button>
                <button id="show-solve">Solve</button>
            </nav>
        </header>

        <!-- SETUP VIEW -->
        <main id="setup-view" class="view">
            <div id="category-inputs-container">
                <!-- Category blocks will be injected here -->
            </div>
            <div class="controls setup-controls">
                <button id="save-setup" class="primary-btn">Next: Clues</button>
            </div>
        </main>

        <!-- CLUES VIEW -->
        <main id="clues-view" class="view hidden">
            <section class="clue-builder">
                <h3>Clue Builder</h3>
                <div class="clue-row">
                    <select id="rel-select">
                        <option value="same">Goes with / Same position</option>
                        <option value="next">Next to</option>
                        <option value="left-of">Immediately to the left of</option>
                        <option value="right-of">Immediately to the right of</option>
                        <option value="between">Is between</option>
                        <option value="position">Is in Position #</option>
                        <option value="left-end">Is at the left end</option>
                        <option value="right-end">Is at the right end</option>
                        <option value="ends">Is at one of the ends</option>
                    </select>
                </div>
                
                <div id="item-selects" class="clue-row">
                    <!-- Dropdowns for items will be injected here -->
                </div>

                <div class="clue-row">
                    <button id="add-clue-btn" class="primary-btn">Add Clue</button>
                </div>
            </section>

            <section class="clues-list-section">
                <h3>Active Clues</h3>
                <ul id="clues-list">
                    <!-- Clues will be listed here -->
                </ul>
            </section>

            <div class="controls">
                <button id="start-solving-btn" class="primary-btn">Start Solving</button>
            </div>
        </main>

        <!-- SOLVE VIEW -->
        <main id="solve-view" class="view hidden">
            <div class="puzzle-grid-wrapper">
                <table class="puzzle-grid">
                    <tbody id="grid-body">
                        <!-- Rows will be injected by JavaScript -->
                    </tbody>
                </table>
            </div>

            <section class="notes-section">
                <label class="notes-label">Active Clues</label>
                <div id="solve-clues-display" class="solve-clues-container">
                    <!-- Clues will be shown here for reference -->
                </div>
            </section>

            <div class="controls">
                <button id="undo-btn" class="secondary-btn">Undo</button>
                <button id="redo-btn" class="secondary-btn">Redo</button>
                <button id="reset-btn">Reset</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
