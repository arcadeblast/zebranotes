<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zebra Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Zebra Notes</h1>
            <nav class="view-switch">
                <button id="show-setup">Setup</button>
                <button id="show-solve">Solve</button>
            </nav>
        </header>

        <!-- SETUP VIEW -->
        <main id="setup-view" class="view">
            <section class="setup-instructions">
                <h2>Configure your Puzzle</h2>
                <p>Enter 5 categories and their 5 possible values each.</p>
            </section>
            
            <div id="category-inputs-container">
                <!-- Category blocks will be injected here -->
            </div>

            <div class="controls setup-controls">
                <button id="save-setup" class="primary-btn">Start Solving</button>
            </div>
        </main>

        <!-- PUZZLE VIEW -->
        <main id="puzzle-view" class="view hidden">
            <div class="puzzle-grid-wrapper">
                <table class="puzzle-grid">
                    <tbody id="grid-body">
                        <!-- Rows will be injected by JavaScript -->
                    </tbody>
                </table>
            </div>

            <section class="notes-section">
                <label class="notes-label">Clues and Notes</label>
                <textarea id="notes-area" placeholder="Type your clues and notes here..."></textarea>
            </section>

            <div class="controls">
                <button id="undo-btn" class="secondary-btn">Undo</button>
                <button id="redo-btn" class="secondary-btn">Redo</button>
                <button id="reset-btn">Reset</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
